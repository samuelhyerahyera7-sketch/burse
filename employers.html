  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

      }

  <script>
    (function() {
      const canvas = document.getElementById('heroCanvas');
      const ctx = canvas.getContext('2d');
      const SPACING = 26, BASE_R = 1.5;
      let dots = [], t = 0;
      function resize() {
        canvas.width  = canvas.parentElement.offsetWidth;
        canvas.height = canvas.parentElement.offsetHeight;
        dots = [];
        for (let y = 0; y <= canvas.height + SPACING; y += SPACING)
          for (let x = 0; x <= canvas.width + SPACING; x += SPACING)
            dots.push({ x, y, ph: Math.random()*6.283, sp: 0.6+Math.random()*0.8, glow:0, glowDir:0, glowSpd:0.008+Math.random()*0.007 });
      }
      function frame() {
        t += 0.012;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (const d of dots) {
          if (d.glowDir===0 && Math.random()<0.0003) d.glowDir=1;
          if (d.glowDir!==0) {
            d.glow += d.glowDir * d.glowSpd;
            if (d.glow>=1){d.glow=1;d.glowDir=-1;}
            else if(d.glow<=0){d.glow=0;d.glowDir=0;}
          }
          const cy = d.y + Math.sin(t*d.sp+d.ph+d.x*0.025)*3;
          ctx.beginPath();
          ctx.arc(d.x, cy, BASE_R+d.glow*2.5, 0, 6.283);
          ctx.fillStyle = `rgba(255,255,255,${Math.min(0.18+d.glow*0.7,1)})`;
          ctx.fill();
        }
        requestAnimationFrame(frame);
      }
      window.addEventListener('resize', resize);
      resize(); frame();
    })();
  </script>
</body>
</html>
