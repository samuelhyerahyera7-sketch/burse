<!DOCTYPE html>
<html lang="en-ZA">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In — Burse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    html, body {
      height: 100%;
      overflow: hidden;
      background: #1e2a6e;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
    }

    .login-wrap {
      width: 100%;
      max-width: 400px;
      padding: 16px;
    }

    .login-logo {
      text-align: center;
      margin-bottom: 16px;
    }
    .login-logo a {
      font-size: 1.8rem;
      font-weight: 900;
      letter-spacing: -0.04em;
      text-decoration: none;
    }
    .login-logo .brand-b  { color: #2ab3b3; }
    .login-logo .brand-urse { color: #1a2f72; }

    .login-card {
      background: #ffffff;
      border-radius: 20px;
      padding: 24px 24px;
      box-shadow: 0 8px 40px rgba(10,20,60,0.1);
      border: 1px solid #e2e8f0;
    }

    .login-card h2 {
      font-size: 1.3rem;
      font-weight: 800;
      color: #0e1c40;
      margin-bottom: 4px;
    }
    .login-card > p {
      font-size: 0.82rem;
      color: #7a8fb0;
      margin-bottom: 16px;
    }

    .form-group { margin-bottom: 12px; }
    .form-group label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: #3d5070;
      margin-bottom: 5px;
    }
    .form-group input {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      font-size: 0.88rem;
      font-family: 'Inter', sans-serif;
      color: #0e1c40;
      background: #f8f9fb;
      transition: border-color 0.18s, box-shadow 0.18s;
      outline: none;
    }
    .form-group input:focus {
      border-color: #2ab3b3;
      box-shadow: 0 0 0 3px rgba(42,179,179,0.15);
      background: #fff;
    }
    .form-group input::placeholder { color: #b0bec5; }

    .forgot {
      text-align: right;
      margin-top: -6px;
      margin-bottom: 16px;
    }
    .forgot a {
      font-size: 0.76rem;
      color: #2ab3b3;
      font-weight: 600;
      text-decoration: none;
    }

    .btn-login {
      width: 100%;
      padding: 12px;
      background: #1a2f72;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.92rem;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: background 0.18s, transform 0.18s;
    }
    .btn-login:hover { background: #0e1c40; transform: translateY(-1px); }

    .error-msg {
      display: none;
      background: #fff0f0;
      border: 1px solid #fca5a5;
      color: #dc2626;
      font-size: 0.78rem;
      padding: 8px 12px;
      border-radius: 8px;
      margin-bottom: 12px;
      font-weight: 500;
    }

    .signup-row {
      text-align: center;
      font-size: 0.82rem;
      color: #7a8fb0;
      margin-top: 14px;
    }
    .signup-row a {
      color: #2ab3b3;
      font-weight: 700;
      text-decoration: none;
    }
  </style>
</head>
<body>

  <div class="login-wrap">

    <div class="login-logo">
      <a href="index.html">
        <span class="brand-b">B</span><span class="brand-urse">urse</span>
      </a>
    </div>

    <div class="login-card">
      <h2>Welcome back</h2>
      <p>Log in to access your earned wages.</p>

      <div class="error-msg" id="errorMsg">
        Incorrect email or password. Please try again.
      </div>

      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="email">Email address</label>
          <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password">
        </div>
        <div class="forgot">
          <a href="#">Forgot password?</a>
        </div>
        <button type="submit" class="btn-login">Log In</button>
      </form>

      <div class="signup-row">
        Don't have an account? <a href="dashboard.html">Get started free</a>
      </div>
    </div>


  </div>

  <script>
    function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');

      // Demo: accept any email with password "demo123"
      if (password === 'demo123') {
        document.querySelector('.btn-login').textContent = 'Logging in...';
        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 800);
      } else {
        errorMsg.style.display = 'block';
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
      }
    }
  </script>

</body>
</html>
